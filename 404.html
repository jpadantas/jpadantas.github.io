    <script>
        // Redirect map: old URLs → new URLs
        const redirects = {
            '/files/dantas2023asa-simaas.pdf': '/files/dantas2025asasimaas.pdf',
            '/files/dantas2022asa.pdf': '/files/dantas2025asa.pdf',
            '/files/dantas2012study_slides.pdf': '/files/dantas2012estudo_slides.pdf',
            '/files/aprovado_no_ita.pdf': '/certificates/2010_ITA_Entrance_Exam.pdf',
            '/files/figueiredo2025analise.pdf': '/files/araujo2025analise.pdf',
            '/files/wsc_diversity_award_2024.pdf': '/certificates/2024_WSC_Diversity_Award.pdf',
            '/files/iymc.pdf': '/certificates/2019_IYMC_Ambassador.pdf',
            '/files/asa-registro.pdf': '/certificates/2024_ASA_Software_Registry.pdf',
        };

        (function () {
            const path = window.location.pathname;
            if (redirects[path]) {
                // Set meta refresh as fallback for bots that don't execute JS
                var meta = document.createElement('meta');
                meta.httpEquiv = 'refresh';
                meta.content = '0; url=' + redirects[path];
                document.head.appendChild(meta);

                // Also set canonical link for SEO
                var link = document.createElement('link');
                link.rel = 'canonical';
                link.href = 'https://www.joaopadantas.com' + redirects[path];
                document.head.appendChild(link);

                window.location.replace(redirects[path]);
            }
        })();
    </script>
</head>
